apiVersion: apps/v1
kind: Deployment
metadata:
  name: rental-redis
spec:
  selector:
    matchLabels:
      app: rental-redis
  template:
    metadata:
      labels:
        app: rental-redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: rental-redis-service
spec:
  selector:
    app: rental-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

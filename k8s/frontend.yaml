apiVersion: apps/v1
kind: Deployment
metadata:
  name: rental-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rental-frontend
  template:
    metadata:
      labels:
        app: rental-frontend
    spec:
      containers:
      - name: app
        image: smart-rental-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: rental-frontend-service
spec:
  selector:
    app: rental-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
